name: $(BuildID)_$(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: pool_name_windows_x64
    displayName: 'Windows x64 Pool'
    type: string
    default: 'Azure-MessagingStore-Win-x64-Dadsv5-v19'
  - name: pool_name_windows_arm64
    displayName: 'Windows ARM64 Pool'
    type: string
    default: 'Azure-MessagingStore-Win-ARM64-Dpldsv6-v01'
  - name: pool_name_linux
    displayName: 'Linux Pool'
    type: string
    default: 'Azure-MsgStore-Linux2204BuildMachinePool'

resources:
  repositories:
  - repository: self
    clean: true
  - repository: c_build_tools
    type: github
    name: azure/c-build-tools
    endpoint: github.com_azure
    ref: ceb07abdecda4a8c06ab4b8bb34c68ead93bcbbf

jobs:
- template: /pipeline_templates/build_all_flavors.yml@c_build_tools
  parameters:
    failOnMinTestsNotRun: false
    pool_name_x64: ${{ parameters.pool_name_windows_x64 }}
    pool_name_arm64: ${{ parameters.pool_name_windows_arm64 }}

- template: /pipeline_templates/run_master_check.yml@c_build_tools
  parameters:
    pool_name: ${{ parameters.pool_name_windows_x64 }}

- template: /pipeline_templates/codeql3000_default.yml@c_build_tools
  parameters:
    pool_name: 'Azure-MessagingStore-Win-x64-Dadsv7-v03'

- job: windowsx64etwperf
  displayName: 'Run Windows x64 RelWithDebInfo ETW Perf tests'
  pool:
    name: ${{ parameters.pool_name_windows_x64 }}
    demands:
    - msbuild
    - visualstudio

  workspace:
    clean: all

  steps:
  - template: /pipeline_templates/get_machine_information.yml@c_build_tools

  # Shallow clone - only need the code at this commit, not full history
  - checkout: self
    submodules: false
    clean: false
    fetchDepth: 1

  # Shallow submodules - only need the pinned commit, not full history
  - script: git submodule update --init --depth 1
    displayName: 'Shallow checkout submodules'

  - template: /pipeline_templates/discover_native_tools.yml@c_build_tools
    parameters:
      architecture: 'x64'

  - template: /pipeline_templates/tasks/cmake.yml@c_build_tools
    parameters:
      architecture: 'x64'
      sourceDirectory: '$(Build.SourcesDirectory)'
      buildDirectory: '$(Build.BinariesDirectory)/build_x64'
      cmakeArgs: '-Drun_perf_tests:bool=ON -Dlog_sink_etw:bool=ON -Dlog_sink_console:bool=OFF -Duse_etw:string=TRACELOGGING'

  - template: /pipeline_templates/tasks/vsbuild.yml@c_build_tools
    parameters:
      architecture: 'x64'
      solution: '$(Build.BinariesDirectory)/build_x64/*.sln'
      configuration: 'RelWithDebInfo'
      msbuildArgs: '/t:restore /t:build'

  - template: /pipeline_templates/tasks/ctest.yml@c_build_tools
    parameters:
      architecture: 'x64'
      workingDirectory: '$(Build.BinariesDirectory)/build_x64'
      configuration: 'RelWithDebInfo'
      additionalArgs: '-V'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish artifacts'
    inputs:
      targetPath: '$(Build.BinariesDirectory)/build_x64'
      artifactName: 'x64_RelWithDebInfo_perf'
      parallel: true
    condition: failed()

  - template: /pipeline_templates/clean_ado_folders.yml@c_build_tools

- template: /pipeline_templates/build_linux.yml@c_build_tools
  parameters:
    pool_name: ${{ parameters.pool_name_linux }}

